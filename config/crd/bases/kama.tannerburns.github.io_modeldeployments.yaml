              and serving state.
            properties:
              artifact:
                description: Artifact identifies the exact verified artifact selected
                  for this workload.
                properties:
                  digest:
                    description: Digest is the verified artifact or canonical manifest
                      SHA-256.
                    pattern: ^[a-f0-9]{64}$
                    type: string
                  name:
                    description: Name is the referenced ModelArtifact name.
                    type: string
                  uid:
                    description: UID identifies the exact ModelArtifact object observed
                      by the controller.
                    type: string
                type: object
              conditions:
                description: Conditions summarize dependency, scheduling, runtime,
                  serving, and degradation state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              deploymentRef:
                description: DeploymentRef identifies the generated singleton Deployment.
                properties:
                  name:
                    description: Name is the generated object's name.
                    type: string
                  uid:
                    description: UID identifies the exact object observed by the controller.
                    type: string
                required:
                - name
                type: object
              desiredReplicas:
                description: DesiredReplicas is one whenever an artifact-backed serving
                  workload should exist.
                format: int32
                maximum: 1
                minimum: 0
                type: integer
              observedGeneration:
                description: ObservedGeneration is the most recent generation reconciled
                  by the controller.
                format: int64
                type: integer
              readyReplicas:
                description: ReadyReplicas is the number of ready replicas for the
                  desired runtime fingerprint.
                format: int32
                maximum: 1
                minimum: 0
                type: integer
              runtime:
                description: Runtime reports the current desired and observed runtime
                  identity.
                properties:
                  acceleratorDetected:
                    description: |-
                      AcceleratorDetected reports whether the runtime observed its configured accelerator.
                      It is nil until a supervisor observation is available.
                    type: boolean
                  desiredFingerprint:
                    description: DesiredFingerprint identifies the current spec, artifact,
                      image, and generated configuration.
                    pattern: ^[a-f0-9]{20}$
                    type: string
                  desiredImage:
                    description: DesiredImage is the image selected by controller
                      configuration.
                    type: string
                  effectiveConcurrency:
                    description: EffectiveConcurrency is the number of runtime slots
                      observed by the supervisor.
                    format: int32
                    minimum: 1
                    type: integer
                  effectiveContextTokens:
                    description: EffectiveContextTokens is the actual per-slot context
                      loaded by the runtime.
                    format: int64
                    minimum: 1
                    type: integer
                  llamaCommit:
                    description: LlamaCommit is the pinned llama.cpp source commit
                      reported by the runtime.
                    pattern: ^[a-f0-9]{40}$
                    type: string
                  loadedFingerprint:
                    description: |-
                      LoadedFingerprint is a durable checkpoint that this exact runtime
                      fingerprint completed loading successfully. It does not by itself imply
                      current readiness; Serving still requires a current supervisor response
                      and ready endpoint.
                    pattern: ^[a-f0-9]{20}$
                    type: string
                  observedFingerprint:
                    description: ObservedFingerprint identifies the configuration
                      reported by the observed serving Pod's supervisor.
                    pattern: ^[a-f0-9]{20}$
                    type: string
                  observedImage:
                    description: ObservedImage is the immutable image identity reported
                      by the serving Pod.
                    type: string
                  offloadedLayers:
                    description: OffloadedLayers is the bounded number of model layers
                      reported as accelerator-offloaded.
                    format: int32
                    minimum: 0
                    type: integer
                  state:
                    description: State is the latest bounded supervisor lifecycle
                      state.
                    enum:
                    - Initializing
                    - Loading
                    - Ready
                    - Draining
                    - LoadFailed
                    - Exited
                    type: string
                type: object
              serviceRef:
                description: ServiceRef identifies the stable internal ClusterIP Service.
                properties:
                  name:
                    description: Name is the generated object's name.
                    type: string
                  uid:
                    description: UID identifies the exact object observed by the controller.
                    type: string
                required:
                - name
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
