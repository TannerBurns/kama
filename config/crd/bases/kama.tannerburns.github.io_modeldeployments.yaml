      type: string
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ModelDeployment is a fixed single-replica llama.cpp serving workload
          for one ModelArtifact.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ModelDeploymentSpec declares one fixed single-replica model-serving
              workload.
            properties:
              args:
                description: Args is reserved so attempts to inject raw runtime arguments
                  fail schema validation.
                type: object
                x-kubernetes-validations:
                - message: args is controller-owned and forbidden
                  rule: "false"
              env:
                description: Env is reserved so attempts to inject environment variables
                  fail schema validation.
                type: object
                x-kubernetes-validations:
                - message: env is controller-owned and forbidden
                  rule: "false"
              image:
                description: Image is reserved so attempts to override runtime images
                  fail schema validation.
                type: object
                x-kubernetes-validations:
                - message: image is controller-owned and forbidden
                  rule: "false"
              modelRef:
                description: ModelRef identifies a ModelArtifact in this namespace.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              paths:
                description: Paths is reserved so attempts to override controller-owned
                  paths fail schema validation.
                type: object
                x-kubernetes-validations:
                - message: paths is controller-owned and forbidden
                  rule: "false"
              placement:
                description: Placement explicitly selects CPU or a single accelerator.
                properties:
                  acceleratorResource:
                    description: |-
                      AcceleratorResource defaults to nvidia.com/gpu in Accelerator mode and is
                      forbidden in CPU mode. M2 admits exactly one full NVIDIA GPU.
                    type: string
                  mode:
                    description: Mode is required; M2 does not perform automatic placement.
                    enum:
                    - CPU
                    - Accelerator
                    type: string
                required:
                - mode
                type: object
              ports:
                description: Ports is reserved so attempts to override network ports
                  fail schema validation.
