                  rule: "false"
              resources:
                description: Resources declares CPU and memory needed by the serving
                  container.
                properties:
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Limits must include memory. CPU and ephemeral-storage
                      limits are optional.
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Requests must include positive CPU and memory values.
                      Ephemeral storage is optional.
                    type: object
                required:
                - limits
                - requests
                type: object
              runtime:
                default: {}
                description: Runtime contains safe llama.cpp serving controls.
                properties:
                  args:
                    description: Args is reserved so raw llama-server arguments cannot
                      be supplied.
                    type: object
                    x-kubernetes-validations:
                    - message: runtime.args is controller-owned and forbidden
                      rule: "false"
                  desiredConcurrency:
                    default: 1
                    description: DesiredConcurrency is the fixed number of independent
                      llama.cpp slots.
                    format: int32
                    maximum: 128
                    minimum: 1
                    type: integer
                  drainTimeout:
                    default: 10m
                    description: DrainTimeout bounds how long active requests may
                      finish during replacement or deletion.
                    type: string
                  env:
                    description: Env is reserved so runtime environment variables
