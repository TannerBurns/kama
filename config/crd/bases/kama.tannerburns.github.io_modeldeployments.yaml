                  expert:
                    default: {}
                    description: |-
                      Expert contains typed low-level performance controls that cannot override
                      Kama-owned model, network, topology, security, or lifecycle arguments.
                    properties:
                      batchSize:
                        default: 2048
                        description: BatchSize is the logical prompt-processing batch
                          size.
                        format: int32
                        minimum: 1
                        type: integer
                      batchThreads:
                        description: BatchThreads explicitly sets prompt-processing
                          threads when present.
                        format: int32
                        minimum: 1
                        type: integer
                      flashAttention:
                        default: Auto
                        description: FlashAttention defaults to Auto.
                        enum:
                        - Auto
                        - Enabled
                        - Disabled
                        type: string
                      microBatchSize:
                        default: 512
                        description: MicroBatchSize is the physical prompt-processing
