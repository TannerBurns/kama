                      rule: "false"
                  kvCache:
                    default: {}
                    description: KVCache selects the key and value cache representations.
                    properties:
                      keyType:
                        default: f16
                        description: KeyType defaults to f16.
                        enum:
                        - f16
                        - q8_0
                        - q4_0
                        type: string
                      valueType:
                        default: f16
                        description: ValueType defaults to f16.
                        enum:
                        - f16
                        - q8_0
                        - q4_0
                        type: string
                    type: object
                  maxContextTokens:
                    description: |-
                      MaxContextTokens is the exact per-request context. Omission selects the
                      model-advertised native context and does not permit silent shrinking.
                    format: int64
                    minimum: 1
                    type: integer
                  paths:
                    description: Paths is reserved so runtime filesystem paths cannot
                      be supplied.
                    type: object
                    x-kubernetes-validations:
                    - message: runtime.paths is controller-owned and forbidden
