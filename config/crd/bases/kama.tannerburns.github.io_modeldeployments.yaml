                  ports:
                    description: Ports is reserved so runtime network ports cannot
                      be supplied.
                    type: object
                    x-kubernetes-validations:
                    - message: runtime.ports is controller-owned and forbidden
                      rule: "false"
                  probes:
                    description: Probes is reserved so runtime health probes cannot
                      be supplied.
                    type: object
                    x-kubernetes-validations:
                    - message: runtime.probes is controller-owned and forbidden
                      rule: "false"
                  replicas:
                    description: Replicas is reserved so the runtime cannot bypass
