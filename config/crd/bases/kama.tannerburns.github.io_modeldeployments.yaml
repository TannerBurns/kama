---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: modeldeployments.kama.tannerburns.github.io
spec:
  group: kama.tannerburns.github.io
  names:
    kind: ModelDeployment
    listKind: ModelDeploymentList
    plural: modeldeployments
    shortNames:
    - md
    singular: modeldeployment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.placement.mode
      name: Mode
      type: string
    - jsonPath: .status.conditions[?(@.type=='Serving')].status
