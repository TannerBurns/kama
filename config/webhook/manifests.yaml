---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-kama-tannerburns-github-io-v1alpha1-modelartifact
  failurePolicy: Fail
  name: mmodelartifact.kama.tannerburns.github.io
  rules:
  - apiGroups:
    - kama.tannerburns.github.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - modelartifacts
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-kama-tannerburns-github-io-v1alpha1-modelcache
  failurePolicy: Fail
  name: mmodelcache.kama.tannerburns.github.io
  rules:
  - apiGroups:
    - kama.tannerburns.github.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - modelcaches
  sideEffects: None
