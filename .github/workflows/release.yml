name: Release

on:
  push:
    tags:
      - v*

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish signed OCI artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      MANAGER_IMAGE: ghcr.io/tannerburns/kama-manager
      IMPORTER_IMAGE: ghcr.io/tannerburns/kama-importer
      FIXTURES_IMAGE: ghcr.io/tannerburns/kama-test-fixtures
      RUNTIME_CPU_IMAGE: ghcr.io/tannerburns/kama-runtime-cpu
      RUNTIME_CUDA_IMAGE: ghcr.io/tannerburns/kama-runtime-cuda
      CHART_REPOSITORY: ghcr.io/tannerburns/charts
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install pinned release tools
        run: make bootstrap supply-chain-tools

      - name: Validate release tag and source
        id: metadata
        shell: bash
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          if [[ "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "tag ${GITHUB_REF_NAME} does not match VERSION ${version}" >&2
            exit 1
          fi
          created="$(git show -s --format=%cI HEAD)"
          epoch="$(git show -s --format=%ct HEAD)"
          llama_commit="$(awk '$1 == "LLAMA_CPP_COMMIT" {print $3}' hack/versions.mk)"
          llama_build_number="$(awk '$1 == "LLAMA_CPP_BUILD_NUMBER" {print $3}' hack/versions.mk)"
          llama_source_sha256="$(awk '$1 == "LLAMA_CPP_SOURCE_SHA256" {print $3}' hack/versions.mk)"
          {
            echo "version=${version}"
            echo "created=${created}"
            echo "epoch=${epoch}"
            echo "llama_commit=${llama_commit}"
            echo "llama_build_number=${llama_build_number}"
            echo "llama_source_sha256=${llama_source_sha256}"
          } >> "${GITHUB_OUTPUT}"
          RELEASE_TAG="${GITHUB_REF_NAME}" make release-check

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish manager image
        id: manager
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.MANAGER_IMAGE }}:${{ steps.metadata.outputs.version }}
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            VCS_REF=${{ github.sha }}
            CREATED=${{ steps.metadata.outputs.created }}
            SOURCE_DATE_EPOCH=${{ steps.metadata.outputs.epoch }}
          provenance: mode=max

      - name: Build and publish importer image
        id: importer
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.importer
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMPORTER_IMAGE }}:${{ steps.metadata.outputs.version }}
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            VCS_REF=${{ github.sha }}
            CREATED=${{ steps.metadata.outputs.created }}
            SOURCE_DATE_EPOCH=${{ steps.metadata.outputs.epoch }}
          provenance: mode=max

      - name: Build and publish fixture image
        id: fixtures
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.test-fixtures
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.FIXTURES_IMAGE }}:${{ steps.metadata.outputs.version }}
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            VCS_REF=${{ github.sha }}
            CREATED=${{ steps.metadata.outputs.created }}
            SOURCE_DATE_EPOCH=${{ steps.metadata.outputs.epoch }}
          provenance: mode=max

      - name: Build and publish CPU runtime image
        id: runtime-cpu
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.runtime-cpu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.RUNTIME_CPU_IMAGE }}:${{ steps.metadata.outputs.version }}
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            VCS_REF=${{ github.sha }}
            CREATED=${{ steps.metadata.outputs.created }}
            SOURCE_DATE_EPOCH=${{ steps.metadata.outputs.epoch }}
            LLAMA_CPP_COMMIT=${{ steps.metadata.outputs.llama_commit }}
            LLAMA_CPP_BUILD_NUMBER=${{ steps.metadata.outputs.llama_build_number }}
            LLAMA_CPP_SOURCE_SHA256=${{ steps.metadata.outputs.llama_source_sha256 }}
          provenance: mode=max

      - name: Build and publish CUDA runtime image
        id: runtime-cuda
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.runtime-cuda
          platforms: linux/amd64
          push: true
          tags: ${{ env.RUNTIME_CUDA_IMAGE }}:${{ steps.metadata.outputs.version }}
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            VCS_REF=${{ github.sha }}
            CREATED=${{ steps.metadata.outputs.created }}
            SOURCE_DATE_EPOCH=${{ steps.metadata.outputs.epoch }}
            LLAMA_CPP_COMMIT=${{ steps.metadata.outputs.llama_commit }}
            LLAMA_CPP_BUILD_NUMBER=${{ steps.metadata.outputs.llama_build_number }}
            LLAMA_CPP_SOURCE_SHA256=${{ steps.metadata.outputs.llama_source_sha256 }}
          provenance: mode=max

      - name: Validate published runtime manifests and binaries
        shell: bash
        run: |
          manager_ref="${MANAGER_IMAGE}@${{ steps.manager.outputs.digest }}"
          importer_ref="${IMPORTER_IMAGE}@${{ steps.importer.outputs.digest }}"
          fixtures_ref="${FIXTURES_IMAGE}@${{ steps.fixtures.outputs.digest }}"
          runtime_cpu_ref="${RUNTIME_CPU_IMAGE}@${{ steps.runtime-cpu.outputs.digest }}"
          runtime_cuda_ref="${RUNTIME_CUDA_IMAGE}@${{ steps.runtime-cuda.outputs.digest }}"

          cpu_platforms="$(docker buildx imagetools inspect --raw "${runtime_cpu_ref}" | jq -c \
            '[.manifests[].platform | select(.os == "linux") | (.os + "/" + .architecture)] | unique | sort')"
          cuda_platforms="$(docker buildx imagetools inspect --raw "${runtime_cuda_ref}" | jq -c \
            '[.manifests[].platform | select(.os == "linux") | (.os + "/" + .architecture)] | unique | sort')"
          if [[ "${cpu_platforms}" != '["linux/amd64","linux/arm64"]' ]]; then
            echo "published CPU runtime platforms are ${cpu_platforms}" >&2
            exit 1
          fi
          if [[ "${cuda_platforms}" != '["linux/amd64"]' ]]; then
            echo "published CUDA runtime platforms are ${cuda_platforms}" >&2
            exit 1
          fi

          for ref in "${manager_ref}" "${importer_ref}" "${fixtures_ref}" \
            "${runtime_cpu_ref}" "${runtime_cuda_ref}"; do
            docker pull --platform linux/amd64 "${ref}"
          done
          CHECK_IMAGES=1 \
            IMG="${manager_ref}" \
            IMPORTER_IMG="${importer_ref}" \
            FIXTURES_IMG="${fixtures_ref}" \
            RUNTIME_CPU_IMG="${runtime_cpu_ref}" \
            RUNTIME_CUDA_IMG="${runtime_cuda_ref}" \
            bash hack/release-check.sh

          expected_llama_version="version: ${{ steps.metadata.outputs.llama_build_number }} (${{ steps.metadata.outputs.llama_commit }})"
          if ! llama_version="$(docker run --rm --platform linux/amd64 \
            --entrypoint /usr/local/bin/llama-server "${runtime_cpu_ref}" --version 2>&1)"; then
            echo "published CPU runtime ${runtime_cpu_ref} could not execute llama-server --version" >&2
            printf '%s\n' "${llama_version}" >&2
            exit 1
          fi
          if ! grep -Fq "${expected_llama_version}" <<<"${llama_version}"; then
            echo "published CPU runtime ${runtime_cpu_ref} has unexpected llama-server identity" >&2
            printf '%s\n' "${llama_version}" >&2
            exit 1
          fi

          docker pull --platform linux/arm64 "${runtime_cpu_ref}"
          arm64_supervisor_version="$(docker run --rm --platform linux/arm64 "${runtime_cpu_ref}" --version)"
          if [[ "${arm64_supervisor_version}" != "${{ steps.metadata.outputs.version }}" ]]; then
            echo "published arm64 CPU supervisor version is ${arm64_supervisor_version}" >&2
            exit 1
          fi
          if ! arm64_llama_version="$(docker run --rm --platform linux/arm64 \
            --entrypoint /usr/local/bin/llama-server "${runtime_cpu_ref}" --version 2>&1)"; then
            echo "published arm64 CPU runtime could not execute llama-server --version" >&2
            printf '%s\n' "${arm64_llama_version}" >&2
            exit 1
          fi
          if ! grep -Fq "${expected_llama_version}" <<<"${arm64_llama_version}"; then
            echo "published arm64 CPU runtime has unexpected llama-server identity" >&2
            printf '%s\n' "${arm64_llama_version}" >&2
            exit 1
          fi

      - name: Package and publish Helm chart
        id: chart
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          make helm-package
          printf '%s' "${GH_TOKEN}" | ./bin/helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
          output="$(./bin/helm push "dist/kama-${{ steps.metadata.outputs.version }}.tgz" "oci://${CHART_REPOSITORY}" 2>&1)"
          printf '%s\n' "${output}"
          digest="$(printf '%s\n' "${output}" | awk '$1 == "Digest:" {print $2}' | tail -n 1)"
          if [[ ! "${digest}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "could not determine pushed chart digest" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Record immutable release values
        shell: bash
        run: |
          mkdir -p dist/release
          jq -n \
            --arg managerDigest "${{ steps.manager.outputs.digest }}" \
            --arg importerDigest "${{ steps.importer.outputs.digest }}" \
            --arg runtimeCPUDigest "${{ steps.runtime-cpu.outputs.digest }}" \
            --arg runtimeCUDADigest "${{ steps.runtime-cuda.outputs.digest }}" '{
              image: {repository: "ghcr.io/tannerburns/kama-manager", digest: $managerDigest},
              importer: {image: {repository: "ghcr.io/tannerburns/kama-importer", digest: $importerDigest}},
              runtime: {
                cpu: {image: {repository: "ghcr.io/tannerburns/kama-runtime-cpu", digest: $runtimeCPUDigest}},
                cuda: {image: {repository: "ghcr.io/tannerburns/kama-runtime-cuda", digest: $runtimeCUDADigest}}
              }
            }' >dist/release/immutable-values.json
          ./bin/helm template kama "dist/kama-${{ steps.metadata.outputs.version }}.tgz" \
            --namespace kama-system \
            --values dist/release/immutable-values.json >/dev/null

      - name: Generate SPDX SBOMs
        shell: bash
        run: |
          mkdir -p dist/sbom
          ./bin/syft "registry:${MANAGER_IMAGE}@${{ steps.manager.outputs.digest }}" \
            --output spdx-json=dist/sbom/kama-manager.spdx.json
          ./bin/syft "registry:${IMPORTER_IMAGE}@${{ steps.importer.outputs.digest }}" \
            --output spdx-json=dist/sbom/kama-importer.spdx.json
          ./bin/syft "registry:${FIXTURES_IMAGE}@${{ steps.fixtures.outputs.digest }}" \
            --output spdx-json=dist/sbom/kama-test-fixtures.spdx.json
          ./bin/syft "registry:${RUNTIME_CPU_IMAGE}@${{ steps.runtime-cpu.outputs.digest }}" \
            --output spdx-json=dist/sbom/kama-runtime-cpu.spdx.json
          ./bin/syft "registry:${RUNTIME_CUDA_IMAGE}@${{ steps.runtime-cuda.outputs.digest }}" \
            --output spdx-json=dist/sbom/kama-runtime-cuda.spdx.json
          ./bin/syft "file:dist/kama-${{ steps.metadata.outputs.version }}.tgz" \
            --output spdx-json=dist/sbom/kama-chart.spdx.json

      - name: Sign immutable digests and attach SBOM attestations
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          manager_ref="${MANAGER_IMAGE}@${{ steps.manager.outputs.digest }}"
          importer_ref="${IMPORTER_IMAGE}@${{ steps.importer.outputs.digest }}"
          fixtures_ref="${FIXTURES_IMAGE}@${{ steps.fixtures.outputs.digest }}"
          runtime_cpu_ref="${RUNTIME_CPU_IMAGE}@${{ steps.runtime-cpu.outputs.digest }}"
          runtime_cuda_ref="${RUNTIME_CUDA_IMAGE}@${{ steps.runtime-cuda.outputs.digest }}"
          chart_ref="${CHART_REPOSITORY}/kama@${{ steps.chart.outputs.digest }}"

          ./bin/cosign sign "${manager_ref}"
          ./bin/cosign sign "${importer_ref}"
          ./bin/cosign sign "${fixtures_ref}"
          ./bin/cosign sign "${runtime_cpu_ref}"
          ./bin/cosign sign "${runtime_cuda_ref}"
          ./bin/cosign sign "${chart_ref}"

          ./bin/cosign attest --type spdxjson --predicate dist/sbom/kama-manager.spdx.json "${manager_ref}"
          ./bin/cosign attest --type spdxjson --predicate dist/sbom/kama-importer.spdx.json "${importer_ref}"
          ./bin/cosign attest --type spdxjson --predicate dist/sbom/kama-test-fixtures.spdx.json "${fixtures_ref}"
          ./bin/cosign attest --type spdxjson --predicate dist/sbom/kama-runtime-cpu.spdx.json "${runtime_cpu_ref}"
          ./bin/cosign attest --type spdxjson --predicate dist/sbom/kama-runtime-cuda.spdx.json "${runtime_cuda_ref}"
          ./bin/cosign attest --type spdxjson --predicate dist/sbom/kama-chart.spdx.json "${chart_ref}"

      - name: Upload release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ steps.metadata.outputs.version }}
          path: |
            dist/kama-*.tgz
            dist/release/immutable-values.json
            dist/sbom/*.spdx.json
          if-no-files-found: error
          retention-days: 90
