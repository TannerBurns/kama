name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - LICENSE
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - LICENSE
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and policy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Install pinned tools
        run: make controller-gen helm golangci-lint govulncheck go-licenses actionlint

      - name: Check formatting, vet, and lint
        run: make fmt-check vet lint

      - name: Check generated files
        run: make verify-generated

      - name: Check vulnerability, license, workflow, and chart policy
        run: make vuln-check license-check workflow-check helm-validate

      - name: Check release metadata
        run: make release-check

  tests:
    name: Race and envtest
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Install pinned tools
        run: make envtest

      - name: Run race-enabled unit tests
        run: make test

      - name: Run race-enabled envtest
        run: make test-envtest

  packaging:
    name: Images, chart, and SBOMs
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      IMG: local/kama-manager:ci
      FIXTURES_IMG: local/kama-test-fixtures:ci
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install pinned tools
        run: make helm

      - name: Build manager and fixture images
        run: make container

      - name: Package Helm chart
        run: make helm-package

      - name: Verify image and chart versions
        env:
          CHECK_IMAGES: "1"
        run: bash hack/release-check.sh

      - name: Generate SPDX SBOMs
        run: make sbom

      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: m0-supply-chain-${{ github.sha }}
          path: |
            dist/kama-*.tgz
            dist/sbom/*.spdx.json
          if-no-files-found: error
          retention-days: 14
