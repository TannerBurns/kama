name: Kind compatibility

on:
  pull_request:
    branches:
      - main
    paths:
      - "api/**"
      - "charts/**"
      - "cmd/**"
      - "config/**"
      - "examples/**"
      - "hack/**"
      - "internal/**"
      - "test/**"
      - .dockerignore
      - .go-version
      - "Dockerfile*"
      - Makefile
      - PROJECT
      - VERSION
      - go.mod
      - go.sum
      - .github/workflows/kind.yml
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "charts/**"
      - "cmd/**"
      - "config/**"
      - "examples/**"
      - "hack/**"
      - "internal/**"
      - "test/**"
      - .dockerignore
      - .go-version
      - "Dockerfile*"
      - Makefile
      - PROJECT
      - VERSION
      - go.mod
      - go.sum
      - .github/workflows/kind.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kind-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind:
    name: Kubernetes ${{ matrix.kubernetes }} / admission / KEDA 2.20
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - kubernetes: "1.34"
            node-image: kindest/node:v1.34.8@sha256:02722c2dedddcfc00febf5d27fbeb9b7b2c14294c82109ff4a85d89ac9ba3256
          - kubernetes: "1.35"
            node-image: kindest/node:v1.35.5@sha256:ce977ae6d65918d0b58a5f8b5e940429c2ce42fa3a5619ec2bbc60b949c0ac95
          - kubernetes: "1.36"
            node-image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Install pinned Kind, Helm, and build tools
        run: make kind helm

      - name: Run install, admission, activation, fixture, and uninstall smoke
        env:
          KIND_CLUSTER: kama-${{ matrix.kubernetes }}
          KIND_NODE_IMAGE: ${{ matrix.node-image }}
          KEDA_VERSION: 2.20.0
        run: make test-kind K8S_MINOR=${{ matrix.kubernetes }}

      - name: Run production CPU serving, failure, and drain acceptance
        env:
          KIND_CLUSTER: kama-serving-${{ matrix.kubernetes }}-${{ github.run_id }}-${{ github.run_attempt }}
          KIND_NODE_IMAGE: ${{ matrix.node-image }}
          E2E_EVIDENCE_DIR: dist/e2e/serving-cpu-${{ matrix.kubernetes }}
        run: make test-e2e-serving-cpu K8S_MINOR=${{ matrix.kubernetes }}

      - name: Verify complete qualifying CPU evidence
        env:
          CPU_E2E_EVIDENCE_DIR: dist/e2e/serving-cpu-${{ matrix.kubernetes }}
          E2E_EXPECTED_COMMIT: ${{ github.sha }}
        run: make verify-e2e-serving-cpu-evidence K8S_MINOR=${{ matrix.kubernetes }}

      - name: Upload CPU serving evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-serving-cpu-kubernetes-${{ matrix.kubernetes }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/e2e/serving-cpu-${{ matrix.kubernetes }}/
          if-no-files-found: error
          retention-days: 90

  m2-cpu-acceptance:
    name: M2 CPU/Kind acceptance
    if: ${{ always() }}
    needs:
      - kind
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Require every Kubernetes matrix entry
        env:
          MATRIX_RESULT: ${{ needs.kind.result }}
        run: |
          if [[ "${MATRIX_RESULT}" != "success" ]]; then
            echo "M2 CPU/Kind matrix result is ${MATRIX_RESULT}, want success" >&2
            exit 1
          fi
