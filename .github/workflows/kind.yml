name: Kind compatibility

on:
  pull_request:
    branches:
      - main
    paths:
      - "charts/**"
      - "cmd/**"
      - "config/**"
      - "hack/**"
      - "internal/**"
      - "test/**"
      - .dockerignore
      - .go-version
      - "Dockerfile*"
      - Makefile
      - PROJECT
      - VERSION
      - go.mod
      - go.sum
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - "cmd/**"
      - "config/**"
      - "hack/**"
      - "internal/**"
      - "test/**"
      - .dockerignore
      - .go-version
      - "Dockerfile*"
      - Makefile
      - PROJECT
      - VERSION
      - go.mod
      - go.sum
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kind-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind:
    name: Kubernetes ${{ matrix.kubernetes }} / KEDA 2.20
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - kubernetes: "1.34"
            node-image: kindest/node:v1.34.8@sha256:02722c2dedddcfc00febf5d27fbeb9b7b2c14294c82109ff4a85d89ac9ba3256
          - kubernetes: "1.35"
            node-image: kindest/node:v1.35.5@sha256:ce977ae6d65918d0b58a5f8b5e940429c2ce42fa3a5619ec2bbc60b949c0ac95
          - kubernetes: "1.36"
            node-image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Install pinned Kind, Helm, and build tools
        run: make kind helm

      - name: Run install, activation, fixture, and uninstall smoke
        env:
          KIND_CLUSTER: kama-${{ matrix.kubernetes }}
          KIND_NODE_IMAGE: ${{ matrix.node-image }}
          KEDA_VERSION: 2.20.0
        run: make test-kind
