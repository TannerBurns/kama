apiVersion: kama.tannerburns.github.io/v1alpha1
kind: ModelArtifact
metadata:
  name: m1-live-private
  namespace: kama-system
spec:
  format: GGUF
  entrypoint: M1_PRIVATE_HF_FILE
  cacheRef:
    name: m1-live-private-cache
  verification:
    expectedSHA256: M1_PRIVATE_HF_SHA256
    expectedSize: M1_PRIVATE_HF_SIZE
  source:
    huggingFace:
      repository: M1_PRIVATE_HF_REPOSITORY
      revision: M1_PRIVATE_HF_REVISION
      files:
        - M1_PRIVATE_HF_FILE
      tokenSecretRef:
        name: m1-live-huggingface-token
        key: token
