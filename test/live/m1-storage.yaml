apiVersion: v1
kind: PersistentVolume
metadata:
  name: kama-m1-live-cache
spec:
  capacity:
    storage: 2Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: kama-m1-live-local
  local:
    path: /var/local/kama-m1-live-cache
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - KAMA_WORKER_NODE
---
apiVersion: kama.tannerburns.github.io/v1alpha1
kind: ModelCache
metadata:
  name: m1-live-cache
  namespace: kama-system
spec:
  retentionPolicy: Retain
  storage:
    claimTemplate:
      spec:
        storageClassName: kama-m1-live-local
        accessModes:
          - ReadWriteOnce
        volumeMode: Filesystem
        resources:
          requests:
            storage: 2Gi
