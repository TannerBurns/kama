apiVersion: v1
kind: Secret
metadata:
  name: kind-huggingface-token
  namespace: kama-system
type: Opaque
stringData:
  token: kama-test-token
---
apiVersion: kama.tannerburns.github.io/v1alpha1
kind: ModelArtifact
metadata:
  name: kind-private
  namespace: kama-system
spec:
  format: GGUF
  entrypoint: model.gguf
  cacheRef:
    name: kind-cache
  source:
    huggingFace:
      repository: kama/private-gguf
      revision: 0123456789abcdef0123456789abcdef01234567
      files:
        - model.gguf
      tokenSecretRef:
        name: kind-huggingface-token
        key: token
