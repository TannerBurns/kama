---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: kama-external-scaler
  namespace: kama-system
  labels:
    app.kubernetes.io/name: kama-external-scaler
    app.kubernetes.io/instance: kind
spec:
  scaleTargetRef:
    name: kama-activation-target
  pollingInterval: 1
  cooldownPeriod: 5
  minReplicaCount: 0
  maxReplicaCount: 1
  triggers:
    - type: external-push
      metadata:
        scalerAddress: kama-external-scaler.kama-system.svc.cluster.local:6000
