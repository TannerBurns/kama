  name: kama-activation-target
  namespace: kama-system
  labels:
    app.kubernetes.io/name: kama-activation-target
    app.kubernetes.io/instance: kind
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: kama-activation-target
      app.kubernetes.io/instance: kind
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kama-activation-target
