apiVersion: apps/v1
kind: Deployment
metadata:
  name: kama-external-scaler
  namespace: kama-system
  labels:
    app.kubernetes.io/name: kama-external-scaler
    app.kubernetes.io/instance: kind
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kama-external-scaler
      app.kubernetes.io/instance: kind
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kama-external-scaler
        app.kubernetes.io/instance: kind
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scaler
          image: KAMA_FIXTURES_IMAGE
          imagePullPolicy: Never
          command:
            - /external-scaler
          args:
            - --listen-address=:6000
            - --control-address=:8082
            - --initial-metric=0
            - --target-size=1
            - --metric-name=kama_pending_requests
          ports:
            - name: grpc
              containerPort: 6000
            - name: control
              containerPort: 8082
          readinessProbe:
            httpGet:
              path: /state
              port: control
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kama-external-scaler
  namespace: kama-system
  labels:
    app.kubernetes.io/name: kama-external-scaler
    app.kubernetes.io/instance: kind
spec:
  selector:
    app.kubernetes.io/name: kama-external-scaler
    app.kubernetes.io/instance: kind
  ports:
    - name: grpc
      port: 6000
      targetPort: grpc
    - name: control
      port: 8082
      targetPort: control
---
