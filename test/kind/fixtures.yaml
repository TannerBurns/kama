    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: target
          image: KAMA_FIXTURES_IMAGE
          imagePullPolicy: Never
          args:
            - --listen-address=:8080
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
