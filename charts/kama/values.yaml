replicaCount: 1
revisionHistoryLimit: 3
# Hold a replacement manager Ready before retiring the previous fail-closed
# admission endpoint. This gives EndpointSlice and API-server routing time to
# converge during certificate-refresh upgrades.
minReadySeconds: 10

image:
  repository: ghcr.io/tannerburns/kama-manager
  # Defaults to the chart appVersion when empty.
  tag: ""
  # When set, digest takes precedence over tag.
  digest: ""
  pullPolicy: IfNotPresent

importer:
  image:
    repository: ghcr.io/tannerburns/kama-importer
    # Defaults to the chart appVersion when empty.
    tag: ""
    # When set, digest takes precedence over tag.
    digest: ""
    pullPolicy: IfNotPresent
  # Image pull Secrets copied to importer Jobs. Entries may be names or
  # objects with a name field.
  imagePullSecrets: []
  hubEndpoint: https://huggingface.co

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

rbac:
  # Installs the cluster-wide controller permissions and namespace-scoped
  # leader-election permissions.
  create: true

leaderElection:
  enabled: true

metrics:
  enabled: false
  secure: true
  port: 8443

health:
  port: 8081

webhook:
  enabled: true
  # controller-runtime's M1 webhook listener is fixed at 9443.
  port: 9443
  failurePolicy: Fail
  timeoutSeconds: 10
  tls:
    # Defaults to <release>-webhook-tls when empty. The Secret is managed by
    # Helm; its CA is reused and the serving certificate is refreshed on upgrade.
    secretName: ""
    caValidityDays: 3650
    certificateValidityDays: 365
    certName: tls.crt
    keyName: tls.key

service:
  type: ClusterIP
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 1
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3

terminationGracePeriodSeconds: 10

extraArgs: []
extraEnv: []

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

priorityClassName: ""
