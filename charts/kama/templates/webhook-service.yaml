{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kama.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kama.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kama.selectorLabels" . | nindent 4 }}
  ports:
    - name: webhook
      port: 443
      protocol: TCP
      targetPort: webhook
{{- end }}
