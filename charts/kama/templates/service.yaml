apiVersion: v1
kind: Service
metadata:
  name: {{ include "kama.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kama.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kama.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: {{ .Values.health.port }}
      protocol: TCP
      targetPort: health
    {{- if .Values.metrics.enabled }}
    - name: {{ ternary "https-metrics" "http-metrics" .Values.metrics.secure }}
      port: {{ .Values.metrics.port }}
      protocol: TCP
      targetPort: metrics
    {{- end }}
