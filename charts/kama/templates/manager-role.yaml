{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kama.clusterScopedName" . }}-manager
  labels:
    {{- include "kama.labels" . | nindent 4 }}
    kama.tannerburns.github.io/release-namespace: {{ .Release.Namespace | quote }}
rules:
  - apiGroups:
      - kama.tannerburns.github.io
    resources:
      - modelartifacts
      - modelcaches
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - kama.tannerburns.github.io
    resources:
      - modelartifacts/finalizers
      - modelcaches/finalizers
    verbs:
      - update
  - apiGroups:
      - kama.tannerburns.github.io
    resources:
      - modelartifacts/status
      - modelcaches/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - persistentvolumes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - storage.k8s.io
    resources:
      - storageclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - get
      - list
      - patch
      - watch
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
{{- end }}
