{{- if and .Values.rbac.create .Values.metrics.enabled .Values.metrics.secure }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kama.clusterScopedName" . }}-metrics-auth
  labels:
    {{- include "kama.labels" . | nindent 4 }}
    kama.tannerburns.github.io/release-namespace: {{ .Release.Namespace | quote }}
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
{{- end }}
